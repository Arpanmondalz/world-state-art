# Workflow: Update World State Data
# Status: DISABLED (no triggers)
#
# To re-enable:
# 1) Uncomment the `on:` section below to restore schedule & manual runs:
#
# on:
#   # Runs every 30 minutes
#   schedule:
#     - cron: '*/30 * * * *'
  
#   # Allows manual trigger from Actions tab
#   workflow_dispatch:
#
# 2) Remove the job-level "if: ${{ false }}" so the job can run again.
# 3) Commit your changes.
#
# Tip: You can enable only workflow_dispatch if you prefer manual-only runs.
#
# Note: With no `on:` block, GitHub Actions will never trigger this workflow.

permissions:
  contents: write

jobs:
  update-data:
    # Safety stop: prevents execution even if someone accidentally re-adds a trigger.
    if: ${{ false }}
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run data update script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python update_world_state.py

    - name: Commit and push if data changed
      run: |
        git config --global user.name 'World State Bot'
        git config --global user.email 'worldstate-bot@users.noreply.github.com'
        git add world_data.json
        
        # Only commit if there are changes
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Update world state data [$(date '+%Y-%m-%d %H:%M UTC')]"
          git push
